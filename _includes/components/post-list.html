<ul class="portfolio-list">
  {%- for post in posts -%}
  <li>
    {%- if post.imageresize -%}
    <figure>
      {% picture thumbnail "{{ post.imageresize }}" --alt {{ post.imagealt }} %}
    </figure>
    {%- endif -%}
    <div class="portfolio-content">
      <h3>{{ post.title | escape }}</h3>
    </div>
    <a class="post-link" href="{{ post.url | relative_url }}" aria-label="continue-reading"></a>
  </li>
  {%- endfor -%}
</ul>
